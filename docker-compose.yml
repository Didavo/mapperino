services:
  mapperino:
    build:
      context: .
      dockerfile: Dockerfile
    image: mapperino:latest
    container_name: mapperino
    # Kein direktes Port-Binding – Caddy übernimmt den externen Zugriff
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
    networks:
      - web           # Caddy → Mapperino
      - scraper_db    # Mapperino → event_scraper_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/events?from=2099-01-01"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Umami Analytics ────────────────────────────────────────────────────────
  umami-db:
    image: postgres:15-alpine
    container_name: umami-db
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
    volumes:
      - umami_db_data:/var/lib/postgresql/data
    networks:
      - umami_internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 10s
      timeout: 5s
      retries: 5

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      umami-db:
        condition: service_healthy
    networks:
      - web
      - umami_internal
    restart: unless-stopped

volumes:
  umami_db_data:

networks:
  # Externes Netz – wird vom Scraper/Caddy-Stack erstellt
  web:
    external: true
  # Internes Netz des Scrapers – Name prüfen mit: docker network ls
  # Standard: "<scraper-verzeichnis-name>_internal", meist "scraper_internal"
  scraper_db:
    external: true
    name: scraper_internal   # ← anpassen falls abweichend (siehe Schritt 4)
  umami_internal:
    driver: bridge
